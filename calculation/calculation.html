<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Calculator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#89f7fe,#66a6ff);
}

/* Calculator Box */
.calculator{
  width:380px;
  background:#2fa4c4;
  padding:20px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Display */
#display{
  width:100%;
  height:80px;
  border:none;
  border-radius:15px;
  background:#dfe6e9;
  font-size:32px;
  text-align:right;
  padding:15px;
  margin-bottom:15px;
}

/* Grid Layout */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

/* Button Style */
button{
  height:60px;
  border:none;
  border-radius:15px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

/* Colors */
.memory{ background:#1f8fb3; color:white; }
.clear{ background:#ef476f; color:white; }
.operator{ background:#f6c85f; }
.equal{ background:#20c997; grid-column:span 1; }
.number{ background:#ecf0f1; }
.zero{ grid-column:span 2; }

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" value="0" readonly>

<div class="buttons">

<button class="memory" onclick="memoryClear()">MC</button>
<button class="memory" onclick="memoryRecall()">MR</button>
<button class="memory" onclick="memoryAdd()">M+</button>
<button class="memory" onclick="memorySubtract()">M-</button>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="number" onclick="squareRoot()">√</button>
<button class="number" onclick="percentage()">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number zero" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>
let display = document.getElementById("display");
let memory = 0;

/* Add values */
function append(value){
  if(display.value === "0"){
    display.value = value;
  } else {
    display.value += value;
  }
}

/* Clear */
function clearDisplay(){
  display.value = "0";
}

/* Calculate */
function calculate(){
  try{
    let result = Function("return " + display.value)();
    if(!isFinite(result)){
      display.value = "Error";
    } else {
      display.value = result;
    }
  } catch {
    display.value = "Error";
  }
}

/* Square Root */
function squareRoot(){
  try{
    let val = Function("return " + display.value)();
    if(val < 0){
      display.value = "Error";
    } else {
      display.value = Math.sqrt(val);
    }
  } catch {
    display.value = "Error";
  }
}

/* Percentage */
function percentage(){
  try{
    let val = Function("return " + display.value)();
    display.value = val / 100;
  } catch {
    display.value = "Error";
  }
}

/* Memory Functions */
function memoryAdd(){
  memory += Number(display.value);
}

function memorySubtract(){
  memory -= Number(display.value);
}

function memoryRecall(){
  display.value = memory || 0;
}

function memoryClear(){
  memory = 0;
}
</script>

</body>
</html>
